name: Build ImmortalWrt for multiple devices (custom feed + version per device + select packages)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.device }} (${{ matrix.version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ------------------------------------------------------------------------
          # ADJUST PROFILES AND PACKAGE LISTS TO YOUR ACTUAL SETUP
          # ------------------------------------------------------------------------
          # - device: BPI-R3-Mini
          #   target: mediatek
          #   subtarget: filogic
          #   profile: bananapi_bpi-r3-mini
          #   version: 24.10.6
          #   gcc_version: 13.3.0
          #   release:
          #   custom_pkgs: "luci-app-modeminfo modemmanager"
          # - device: BPI-R4
          #   target: mediatek
          #   subtarget: filogic
          #   profile: bananapi_bpi-r4
          #   version: 24.10.6
          #   gcc_version: 13.3.0
          #   custom_pkgs: "modemmanager"
          - device: XiGuaPi-V3
            target: rockchip
            subtarget: armv8
            profile: nlnet_xiguapi-v3
            version: 24.10.6
            gcc_version: 13.3.0
            custom_pkgs: "luci-app-hypermodem luci-app-modeminfo-quectel luci-app-qmodem-next luci-app-qmodem-ttlfw4 luci-app-qmodem-monitor"
          # - device: MangoPi-M28C
          #   target: rockchip
          #   subtarget: armv8
          #   profile: widora_mangopi-m28c
          #   version: 25.12
          #   gcc_version: 13.3.0
          #   custom_pkgs: "luci-app-modeminfo modemmanager"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache file gawk gettext git \
            libncurses5-dev libssl-dev python3 python3-distutils rsync unzip wget zlib1g-dev

      # ------------------------------------------------------------------
      # Cache & download SDK (per target, subtarget AND version)
      # ------------------------------------------------------------------
      - name: Cache SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: sdk
          key: sdk-${{ matrix.version }}-${{ matrix.target }}-${{ matrix.subtarget }}-v2

      - name: Download SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          mkdir -p sdk && cd sdk
          # Note: For 25.12 the archive name or format might differ – adjust if necessary.
          URL="https://downloads.immortalwrt.org/releases/${{ matrix.version }}/targets/${{ matrix.target }}/${{ matrix.subtarget }}/immortalwrt-sdk-${{ matrix.version }}-${{ matrix.target }}-${{ matrix.subtarget }}_${{ matrix.gcc_version }}_musl.Linux-x86_64.tar.zst"
          wget -qO- "$URL" | tar xJ --strip-components=1

      # ------------------------------------------------------------------
      # Cache & download ImageBuilder
      # ------------------------------------------------------------------
      - name: Cache ImageBuilder
        id: cache-ib
        uses: actions/cache@v4
        with:
          path: imagebuilder
          key: ib-${{ matrix.version }}-${{ matrix.target }}-${{ matrix.subtarget }}-v2

      - name: Download ImageBuilder
        if: steps.cache-ib.outputs.cache-hit != 'true'
        run: |
          mkdir -p imagebuilder && cd imagebuilder
          URL="https://downloads.immortalwrt.org/releases/${{ matrix.version }}/targets/${{ matrix.target }}/${{ matrix.subtarget }}/immortalwrt-imagebuilder-${{ matrix.version }}-${{ matrix.target }}-${{ matrix.subtarget }}.Linux-x86_64.tar.zst"
          wget -qO- "$URL" | tar xJ --strip-components=1

      # ------------------------------------------------------------------
      # Add your custom feeds and directly cloned packages
      # ------------------------------------------------------------------
      - name: Add custom feed to SDK
        working-directory: sdk
        run: |
          echo "src-git custom https://github.com/mdsdtech/modem_feeds;custom" >> feeds.conf.default
          echo "src-git openwrt-bandix https://github.com/timsaya/openwrt-bandix;main" >> feeds.conf.default
          echo "src-git luci-bandix https://github.com/timsaya/luci-app-bandix;main" >> feeds.conf.default
          # Directly clone a package (if you later switch to pre‑compiled, you can remove this)
          git clone --depth 1 --branch master --single-branch --no-checkout https://github.com/muink/luci-app-tinyfilemanager.git package/luci-app-tinyfilemanager
          pushd package/luci-app-tinyfilemanager
          umask 022
          git checkout
          popd

      - name: Update and install feeds
        working-directory: sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ------------------------------------------------------------------
      # Build only the packages you specified in the matrix
      # ------------------------------------------------------------------
      - name: Apply custom package compile-time options
        working-directory: sdk
        run: |
          OPTS_FILE="../configs/${{ matrix.device }}.custom_opts"
          if [ -f "$OPTS_FILE" ]; then
            echo "Applying custom options from $OPTS_FILE"
            cat "$OPTS_FILE" >> .config
            make defconfig
          else
            echo "No custom options file found, using package defaults"
          fi

      - name: Set package names to compile
        id: pkgnames
        run: |
          echo "names=${{ matrix.custom_pkgs }}" >> $GITHUB_OUTPUT

      - name: Build custom packages (if any)
        if: steps.pkgnames.outputs.names != ''
        working-directory: sdk
        run: |
          for pkg in ${{ steps.pkgnames.outputs.names }}; do
            echo "::group::Building $pkg"
            make package/${pkg}/compile V=s -j$(nproc) || exit 1
            echo "::endgroup::"
          done

      # ★ FIXED: Collect compiled packages – now works with both .ipk and .apk
      - name: Collect compiled packages
        if: steps.pkgnames.outputs.names != ''
        run: |
          rm -rf collected-packages && mkdir -p collected-packages
          for pkg in ${{ steps.pkgnames.outputs.names }}; do
            find sdk/bin/packages/ -name "${pkg}_*" \( -name "*.ipk" -o -name "*.apk" \) \
              -exec cp {} collected-packages/ \;
          done

      # Determine target architecture from the SDK
      - name: Determine package architecture from SDK
        id: arch
        working-directory: sdk
        run: |
          ARCH=$(ls bin/packages/ | head -1)
          echo "arch=$ARCH" >> $GITHUB_OUTPUT

      # Add pre‑compiled packages for the current version & architecture (e.g., precompiled/24.10.6/aarch64_cortex-a76/)
      - name: Add pre-compiled packages for this version and architecture
        if: steps.arch.outputs.arch != ''
        run: |
          ARCH="${{ steps.arch.outputs.arch }}"
          VERDIR="precompiled/${{ matrix.version }}/$ARCH"
          if [ -d "$VERDIR" ]; then
            cp "$VERDIR"/* imagebuilder/packages/
            echo "Added pre-compiled packages from $VERDIR"
          else
            echo "No pre-compiled packages for ${{ matrix.version }}/$ARCH"
          fi

      # ------------------------------------------------------------------
      # Assemble final image – copy all compiled + pre‑compiled packages and build index
      # ------------------------------------------------------------------
      - name: Copy all packages into ImageBuilder and generate index
        run: |
          # Freshly compiled packages
          cp collected-packages/* imagebuilder/packages/ 2>/dev/null || true
          # Pre‑compiled packages are already in imagebuilder/packages/ from previous step
          make -C imagebuilder package_index V=s

      - name: Copy device-specific overlay
        run: |
          DEVICE_DIR="files/${{ matrix.device }}"
          if [ -d "$DEVICE_DIR" ]; then
            rm -rf imagebuilder/files
            cp -r "$DEVICE_DIR" imagebuilder/files
            echo "Applied overlay from $DEVICE_DIR"
          else
            echo "No overlay found for ${{ matrix.device }}"
          fi

      - name: Read package list for this device
        id: pkglist
        run: |
          PKGFILE="configs/${{ matrix.device }}.packages"
          if [ -f "$PKGFILE" ]; then
            PACKAGES=$(grep -v '^#' "$PKGFILE" | tr '\n' ' ')
            echo "packages=$PACKAGES" >> $GITHUB_OUTPUT
            echo "Using package list from $PKGFILE"
          else
            CUSTOM="${{ steps.pkgnames.outputs.names }}"
            echo "packages=luci $CUSTOM" >> $GITHUB_OUTPUT
            echo "Using fallback packages"
          fi

      - name: Build firmware image
        working-directory: imagebuilder
        run: |
          make image \
            PROFILE="${{ matrix.profile }}" \
            PACKAGES="${{ steps.pkglist.outputs.packages }}" \
            FILES=files/ \
            ROOTFS_PARTSIZE=900 \
            V=s -j$(nproc)

      # ------------------------------------------------------------------
      # Upload artifact
      # ------------------------------------------------------------------
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: gfriendwrt-${{ matrix.version }}-${{ matrix.target }}-${{ matrix.subtarget }}-${{ matrix.profile }}
          path: imagebuilder/bin/targets/**/*
